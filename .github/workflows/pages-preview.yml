name: Deploy V0.7.1 preview to Pages

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  issue_comment:
    types:
      - created
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  issues: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    if: github.event_name != 'issue_comment' || (github.event.issue.number == 4 && github.event.comment.body == '/deploy-preview')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout V0.7.1 preview branch
        uses: actions/checkout@v7
        with:
          ref: agent/v0.7.1-playability

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build standalone site
        run: npm run build:static

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: static

  deploy:
    if: github.event_name != 'issue_comment' || (github.event.issue.number == 4 && github.event.comment.body == '/deploy-preview')
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

  report:
    if: always() && (github.event_name != 'issue_comment' || (github.event.issue.number == 4 && github.event.comment.body == '/deploy-preview'))
    runs-on: ubuntu-latest
    needs:
      - build
      - deploy
    steps:
      - name: Report deployment result on PR #4
        env:
          GH_TOKEN: ${{ github.token }}
          BUILD_RESULT: ${{ needs.build.result }}
          DEPLOY_RESULT: ${{ needs.deploy.result }}
          PAGE_URL: ${{ needs.deploy.outputs.page_url }}
          REPOSITORY: ${{ github.repository }}
        run: |
          if [ "$DEPLOY_RESULT" = "success" ]; then
            BODY="Pages 试玩版部署成功：${PAGE_URL}"
          else
            BODY="Pages 试玩版部署未完成。build=${BUILD_RESULT}, deploy=${DEPLOY_RESULT}。"
          fi
          gh api "repos/${REPOSITORY}/issues/4/comments" -f body="$BODY"
