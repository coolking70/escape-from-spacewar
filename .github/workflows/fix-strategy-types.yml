name: Fix strategic sector type narrowing

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  patch:
    if: github.head_ref == 'agent/v1.0-strategic-universe'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: agent/v1.0-strategic-universe
      - name: Apply idempotent type fixes
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          persistence = Path('src/strategy/universePersistence.ts')
          text = persistence.read_text()
          text = text.replace(
              'items.every((item) => allowed.includes(item));',
              'items.every((item) => allowed.includes(item as T));'
          )
          persistence.write_text(text)

          rules = Path('src/strategy/universeRules.ts')
          text = rules.read_text()
          text = text.replace(
              'const blueprints = Array.from(new Set([',
              'const blueprints = Array.from(new Set<PermanentBlueprintId>(['
          )
          rules.write_text(text)
          PY
      - name: Commit fixes
        shell: bash
        run: |
          if git diff --quiet; then exit 0; fi
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add src/strategy/universePersistence.ts src/strategy/universeRules.ts
          git commit -m "fix: narrow strategic persistence and legacy types"
          git push origin HEAD:agent/v1.0-strategic-universe
