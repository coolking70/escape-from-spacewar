name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm test
      - run: npm run test:det
      - run: npm run test:campaign
      - name: Run strategic universe tests
        shell: bash
        run: |
          set -o pipefail
          npm run test:strategy 2>&1 | tee strategic-test.log
      - name: Upload strategic diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: strategic-test-log
          path: strategic-test.log
      - run: npm run test:stress
      - run: npm run build:static
