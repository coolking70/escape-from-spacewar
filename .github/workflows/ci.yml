name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Export mobility source snapshot
        uses: actions/upload-artifact@v7
        with:
          name: mobility-source-snapshot
          path: |
            src/campaign/campaignReducer.ts
            src/campaign/campaignTypes.ts
            src/ui/sectorMapPanel.ts
            src/campaign/v08Tests.ts
            .github/workflows/ci.yml
      - run: npm run build
      - run: npm test
      - run: npm run test:det
      - run: npm run test:campaign
      - run: npm run test:stress
      - run: npm run build:static
