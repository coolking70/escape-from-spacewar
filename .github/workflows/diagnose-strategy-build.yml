name: Diagnose strategic sector build

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  diagnose:
    if: github.head_ref == 'agent/v1.0-strategic-universe'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Capture build output
        shell: bash
        run: |
          set -o pipefail
          npm run build 2>&1 | tee strategy-build.log
      - name: Upload build diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: strategy-build-log
          path: strategy-build.log
