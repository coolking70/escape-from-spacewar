name: Rename strategic shell to sector expedition

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  patch:
    if: github.head_ref == 'agent/v1.0-strategic-universe'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: agent/v1.0-strategic-universe
      - name: Update application-facing terminology
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('src/App.ts')
          text = path.read_text()
          replacements = {
              "screen: 'strategic-universe'": "screen: 'strategic-sector'",
              "没有可继续的战略宇宙。": "没有可继续的星域战略远征。",
              "战略宇宙导入失败：": "星域远征导入失败：",
              "Strategic Universe Code（已尝试复制）": "Sector Expedition Code（已尝试复制）"
          }
          for old, new in replacements.items():
              text = text.replace(old, new)
          old_debug = """        turn: this.universe.turn,
        selectedSystem: this.universe.selectedSystemId,
        fleetSystem: this.universe.fleet.systemId,
        resources: this.universe.faction.resources"""
          new_debug = """        sector: this.universe.sectorIndex,
        turn: this.universe.turn,
        phase: this.universe.crisis.phase,
        pressure: this.universe.crisis.pressure,
        gateCalibration: this.universe.extraction.calibration,
        selectedSystem: this.universe.selectedSystemId,
        fleetSystem: this.universe.fleet.systemId,
        resources: this.universe.faction.resources"""
          if old_debug in text:
              text = text.replace(old_debug, new_debug, 1)
          path.write_text(text)
          PY
      - name: Commit terminology update
        shell: bash
        run: |
          if git diff --quiet; then exit 0; fi
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add src/App.ts
          git commit -m "ui: rename strategic mode to sector expedition"
          git push origin HEAD:agent/v1.0-strategic-universe
