name: Restore V0.9 runtime layering

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  repair:
    if: github.head_ref == 'agent/v0.9-organizations-tech'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: agent/v0.9-organizations-tech
          fetch-depth: 0
      - name: Restore application and split reducer layers
        shell: bash
        run: |
          set -euo pipefail
          git show origin/main:src/App.ts > src/App.ts
          git show origin/main:src/campaign/campaignReducer.ts > src/campaign/campaignReducerBase.ts
          cat > src/campaign/campaignReducer.ts <<'EOF'
          export {
            applyCampaignAction,
            applyCampaignBattleResult,
            evaluateCampaignStatus,
            getAvailableCampaignActions
          } from './campaignReducerV09';
          export type { CampaignActionAvailability } from './campaignReducerBase';
          EOF
          python - <<'PY'
          from pathlib import Path
          path = Path('src/campaign/campaignReducerV09.ts')
          text = path.read_text()
          text = text.replace("} from './campaignReducer';", "} from './campaignReducerBase';")
          path.write_text(text)
          PY
      - name: Commit repair
        shell: bash
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add src/App.ts src/campaign/campaignReducer.ts src/campaign/campaignReducerBase.ts src/campaign/campaignReducerV09.ts
          git commit -m "fix: preserve frozen runtime behind V0.9 adapter"
          git push origin HEAD:agent/v0.9-organizations-tech
