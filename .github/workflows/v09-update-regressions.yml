name: Adapt historical campaign tests for V0.9

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  patch:
    if: github.head_ref == 'agent/v0.9-organizations-tech'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: agent/v0.9-organizations-tech
      - name: Patch regression expectations
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          campaign = Path('src/campaign/campaignTests.ts')
          text = campaign.read_text()
          target = "        state = applyCampaignAction(state, { type: 'enterGate' });\n"
          replacement = target + "        if (state.pendingOrganizationEvent) {\n          const option = state.pendingOrganizationEvent.options.find((candidate) => !candidate.requiredValue)!;\n          state = applyCampaignAction(state, { type: 'resolveOrganizationEvent', optionId: option.id });\n        }\n"
          if replacement not in text:
              text = text.replace(target, replacement, 1)
          campaign.write_text(text)

          v081 = Path('src/campaign/v081Tests.ts')
          text = v081.read_text()
          target = "        state = applyCampaignAction(state, { type: 'enterGate', mode: 'normal' });\n"
          replacement = target + "        if (state.pendingOrganizationEvent) {\n          const option = state.pendingOrganizationEvent.options.find((candidate) => !candidate.requiredValue)!;\n          state = applyCampaignAction(state, { type: 'resolveOrganizationEvent', optionId: option.id });\n        }\n"
          if replacement not in text:
              text = text.replace(target, replacement, 1)
          v081.write_text(text)

          v07 = Path('src/campaign/v07Tests.ts')
          text = v07.read_text()
          text = text.replace("new Case('V0.6 存档迁移到 0.2')", "new Case('V0.6 存档迁移到 0.3')")
          text = text.replace("test.eq(migrated.version, '0.2', '迁移后版本正确');", "test.eq(migrated.version, '0.3', '迁移后版本正确');")
          v07.write_text(text)
          PY
      - name: Commit patched tests
        shell: bash
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add src/campaign/campaignTests.ts src/campaign/v07Tests.ts src/campaign/v081Tests.ts
          git commit -m "test: adapt campaign regressions to V0.9 decisions"
          git push origin HEAD:agent/v0.9-organizations-tech
